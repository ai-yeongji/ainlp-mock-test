<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-NLP 직무 역량 시험 대비 문제은행</title>
    <meta name="description" content="AI/NLP 엔지니어 직무 면접 및 지필고사를 준비하는 수험생을 위한 문제 풀이 및 학습 도구입니다.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- MathJax for rendering math equations -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            /* Premium Dark Mode Color Palette */
            --bg-color: #0f111a;
            --surface-color: #1a1d2d;
            --surface-hover: #23273c;
            --primary-color: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --secondary-color: #10b981; /* Emerald */
            --accent-color: #f43f5e; /* Rose */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            
            --glass-bg: rgba(26, 29, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-subtle: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.3);
            
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }

        #app {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .screen {
            display: none;
            padding: 40px;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 {
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 { font-size: 2rem; text-align: center; }
        h2 { font-size: 1.5rem; }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all var(--transition-speed);
            outline: none;
            appearance: none;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed);
            text-align: center;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--surface-hover);
            border-color: var(--text-primary);
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--surface-color), var(--surface-hover));
            border: 1px solid var(--border-color);
            box-shadow: none;
        }
        
        .btn-secondary:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* Quiz UI */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .badge {
            background: var(--surface-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--primary-color);
            border: 1px solid var(--border-color);
        }

        .progress-container {
            width: 100%;
            background-color: var(--surface-color);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), #818cf8);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            border-color: var(--primary-color);
            background-color: var(--surface-hover);
        }

        .opt-num {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            margin-right: 14px;
            border-radius: 7px;
            background: var(--surface-hover);
            border: 1px solid var(--border-color);
            color: var(--text-muted, #94a3b8);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .kbd-hint {
            margin-top: 16px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted, #94a3b8);
        }
        .kbd-hint kbd {
            background: var(--surface-hover);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 1px 7px;
            font-family: inherit;
            font-size: 0.78rem;
        }

        .option-item.selected {
            background-color: rgba(99, 102, 241, 0.15);
            border-color: var(--primary-color);
            box-shadow: inset 0 0 0 1px var(--primary-color);
        }

        .option-item.correct-choice {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--secondary-color);
            box-shadow: inset 0 0 0 1px var(--secondary-color);
        }

        .option-item.wrong-choice {
            background-color: rgba(244, 63, 94, 0.15);
            border-color: var(--accent-color);
            box-shadow: inset 0 0 0 1px var(--accent-color);
        }

        .option-item.disabled {
            cursor: default;
            pointer-events: none;
            opacity: 0.8;
        }

        .short-answer-input {
            width: 100%;
            padding: 16px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Results UI */
        .score-display {
            text-align: center;
            padding: 40px 0;
            background: var(--surface-color);
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--secondary-color) var(--percentage), var(--surface-hover) 0);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .score-circle::before {
            content: "";
            position: absolute;
            width: 130px;
            height: 130px;
            background: var(--surface-color);
            border-radius: 50%;
        }

        .score-text {
            position: relative;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-item {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .result-item.correct {
            border-left: 4px solid var(--secondary-color);
        }

        .result-item.incorrect {
            border-left: 4px solid var(--accent-color);
        }

        .result-q-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .status-badge {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        .status-correct { background: rgba(16, 185, 129, 0.2); color: var(--secondary-color); }
        .status-incorrect { background: rgba(244, 63, 94, 0.2); color: var(--accent-color); }

        .answer-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .explanation-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
        }

        .explanation-title {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Utility */
        .text-muted { color: var(--text-secondary); font-size: 0.9rem;}
        .mb-4 { margin-bottom: 1rem; }
        .mt-4 { margin-top: 1rem; }

        @media (max-width: 600px) {
            .screen { padding: 25px; }
            .btn-group { flex-direction: column; }
            .answer-comparison { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen active">
            <h1>AI/NLP 역량 테스트</h1>
            <p class="subtitle">직무 면접 및 지필고사를 완벽하게 대비하세요.</p>

            <div class="form-group">
                <label for="category-select">학습 카테고리</label>
                <select id="category-select">
                    <option value="all">전체 (All Categories)</option>
                    <option value="Foundations">머신러닝 기초 (Foundations)</option>
                    <option value="NLP Basics">자연어처리 기초 (NLP Basics)</option>
                    <option value="Modeling">모델링 (Modeling)</option>
                    <option value="Model Training">모델 학습 (Model Training)</option>
                    <option value="Inference & Serving">모델 추론 및 서빙 (Inference & Serving)</option>
                    <option value="Optimization">모델 경량화 (Optimization)</option>
                    <option value="Engineering">엔지니어링 (Engineering)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="difficulty-select">난이도</label>
                <select id="difficulty-select">
                    <option value="all">전체 (All Difficulties)</option>
                    <option value="하">하 (개념 확인)</option>
                    <option value="중">중 (응용 및 원리)</option>
                    <option value="상">상 (수식 계산 및 심층 아키텍처 분석)</option>
                </select>
            </div>

            <button class="btn mt-4" id="start-btn">시험 시작하기</button>
            <div id="dashboard-stats" style="margin-top: 20px; text-align: center; display: none;">
                <p class="text-muted" id="progress-text" style="margin-bottom: 12px;"></p>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="retry-wrong-btn" style="display: none;">오답 노트 풀기</button>
                    <button class="btn btn-outline" id="reset-progress-btn">진행 상황 초기화</button>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div>
                    <span class="badge" id="q-category">Category</span>
                    <span class="badge" id="q-difficulty" style="margin-left: 8px;">Difficulty</span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span class="text-muted" id="q-progress-text">1 / 10</span>
                    <button class="badge" style="cursor: pointer; background: var(--surface-hover); border: 1px solid var(--border-color); color: var(--text-primary);" onclick="if(confirm('진행 중인 퀴즈를 종료하고 홈으로 돌아가시겠습니까?')) showDashboard()">🏠 홈으로</button>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="q-progress-bar"></div>
            </div>

            <div class="question-text" id="q-text">Question goes here...</div>

            <div id="q-options-container">
                <!-- Options or Input will be injected here -->
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" id="prev-btn">이전</button>
                <button class="btn btn-secondary" id="next-btn">다음</button>
                <button class="btn" id="submit-btn" style="display: none;">제출 및 채점</button>
            </div>
            <div class="kbd-hint">
                키보드: <kbd>1</kbd>~<kbd>4</kbd> 보기 선택 · <kbd>Enter</kbd> 정답 확인/다음 · <kbd>←</kbd> 이전 · <kbd>→</kbd> 다음
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <h2>시험 결과</h2>
            
            <div class="score-display">
                <div class="score-circle" id="score-circle" style="--percentage: 0deg;">
                    <div class="score-text" id="score-text">0%</div>
                </div>
                <p id="score-summary" class="text-muted">Total: 0 / 0</p>
            </div>

            <h3>상세 결과 및 오답 노트</h3>
            <div class="results-list" id="results-list">
                <!-- Result items injected here -->
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="go-home-btn">메인으로 돌아가기</button>
                <button class="btn" id="review-wrong-btn" style="display: none;">틀린 문제 다시 풀기</button>
            </div>
        </div>
    </div>

    <script>
        // --- Mock Data ---
        const MOCK_QUESTIONS = [
            {
                id: 1,
                category: "Inference & Serving",
                difficulty: "중",
                question: "LLM 추론 서버에서 메모리 병목을 줄이고 Throughput을 높이기 위해, 요청의 길이가 다름에도 불구하고 메모리 파편화를 방지하는 메모리 관리 기법은 무엇인가?",
                type: "multiple-choice",
                options: [
                    "Continuous Batching",
                    "PagedAttention",
                    "Tensor Parallelism",
                    "Speculative Decoding"
                ],
                answer: "PagedAttention",
                explanation: "PagedAttention은 OS의 가상 메모리 페이징 기법에서 착안하여 KV Cache를 고정된 크기의 블록으로 나누어 관리함으로써 메모리 파편화를 거의 0에 가깝게 줄이는 vLLM의 핵심 기술입니다."
            },
            {
                id: 2,
                category: "NLP Basics",
                difficulty: "상",
                question: "임베딩 차원(hidden size)이 768이고 어텐션 헤드(head) 수가 12개인 트랜스포머 모델에서, 단일 어텐션 헤드의 쿼리(Query) 가중치 행렬 W_Q의 파라미터 수는 얼마인가? (단, 바이어스는 무시한다)",
                type: "short-answer",
                answer: "49152",
                explanation: "단일 헤드의 차원 \\( d_k = \\frac{d_{\\text{model}}}{h} = \\frac{768}{12} = 64 \\) 입니다. 각 헤드의 쿼리 가중치 행렬 \\( W_Q \\)의 크기는 \\( d_{\\text{model}} \\times d_k \\)이므로, 파라미터 수는 \\( 768 \\times 64 = 49152 \\)개가 됩니다."
            },
            {
                id: 3,
                category: "Model Training",
                difficulty: "하",
                question: "다음 중 언어 모델의 학습 시, 다음 단어를 예측하는 목적 함수를 최적화하기 위해 흔히 사용되는 손실 함수는?",
                type: "multiple-choice",
                options: [
                    "Mean Squared Error (MSE)",
                    "Cross Entropy Loss",
                    "Hinge Loss",
                    "Contrastive Loss"
                ],
                answer: "Cross Entropy Loss",
                explanation: "주어진 문맥에서 다음 단어의 확률 분포를 정답 분포와 비교할 때, 다중 클래스 분류 문제로 접근하여 Cross Entropy Loss를 주로 사용합니다."
            },
            {
                id: 4,
                category: "Optimization",
                difficulty: "중",
                question: "LLM을 8-bit 또는 4-bit로 양자화(Quantization)하여 메모리 사용량을 줄이면서도 성능 저하를 최소화하기 위해 제안된 파라미터 효율적 미세조정(PEFT) 기법과 결합된 방법론의 이름은?",
                type: "multiple-choice",
                options: [
                    "QLoRA",
                    "Prompt Tuning",
                    "Knowledge Distillation",
                    "Pruning"
                ],
                answer: "QLoRA",
                explanation: "QLoRA(Quantized LoRA)는 사전학습된 모델의 가중치를 4-bit로 양자화하여 메모리를 절약하고, 그 위에 저랭크 어댑터(LoRA)를 추가하여 모델을 미세조정하는 기법입니다."
            },
            {
                id: 5,
                category: "NLP Basics",
                difficulty: "하",
                question: "트랜스포머 아키텍처에서 입력 시퀀스의 순서 정보를 모델에 제공하기 위해 더해지는 벡터는 무엇인가?",
                type: "multiple-choice",
                options: [
                    "Word Embedding",
                    "Positional Encoding",
                    "Attention Mask",
                    "Layer Normalization"
                ],
                answer: "Positional Encoding",
                explanation: "트랜스포머의 어텐션 메커니즘은 순서 정보를 포함하지 않기 때문에, 각 토큰의 위치 정보를 나타내는 Positional Encoding을 임베딩 벡터에 더해줍니다."
            },
            {
                id: 6,
                category: "NLP Basics",
                difficulty: "중",
                question: "자연어 처리에서 단어의 빈도와 역문서 빈도를 결합하여 특정 문서 내 단어의 중요도를 평가하는 통계적 수치는 무엇인가? (약어로 입력)",
                type: "short-answer",
                answer: "TF-IDF",
                explanation: "TF-IDF(Term Frequency-Inverse Document Frequency)는 단어의 문서 내 출현 빈도와 전체 문서 군에서의 출현 빈도의 역수를 곱하여, 특정 단어가 문서에서 가지는 중요도를 수치화한 값입니다."
            },
            {
                id: 7,

        // --- Init & LocalStorage ---
        function init() {
            checkSavedWrongAnswers();
            
            startBtn.addEventListener('click', () => startQuiz(false));
            retryWrongBtn.addEventListener('click', () => startQuiz(true));
            resetProgressBtn.addEventListener('click', resetProgress);
            
            prevBtn.addEventListener('click', () => navigate(-1));
            nextBtn.addEventListener('click', () => navigate(1));
            submitBtn.addEventListener('click', finishQuiz);
            
            goHomeBtn.addEventListener('click', showDashboard);
            reviewWrongBtn.addEventListener('click', () => startQuiz(true));

            document.addEventListener('keydown', handleQuizKeydown);

            // Force MathJax to render if present in initial state (not needed usually)
        }

        function getWrongAnswers() {
            const saved = localStorage.getItem('ainlp_wrong_answers');
            return saved ? JSON.parse(saved) : [];
        }

        function saveWrongAnswers(wrongIds) {
            localStorage.setItem('ainlp_wrong_answers', JSON.stringify(wrongIds));
        }

        // IDs of questions already answered correctly ("mastered"). These are
        // excluded from normal quiz sessions so only new questions keep appearing.
        function getCorrectAnswers() {
            const saved = localStorage.getItem('ainlp_correct_answers');
            return saved ? JSON.parse(saved) : [];
        }

        function saveCorrectAnswers(correctIds) {
            localStorage.setItem('ainlp_correct_answers', JSON.stringify(correctIds));
        }

        function checkSavedWrongAnswers() {
            const wrongIds = getWrongAnswers();
            const correctIds = getCorrectAnswers();
            const total = MOCK_QUESTIONS.length;
            const mastered = correctIds.filter(id => MOCK_QUESTIONS.some(q => q.id === id)).length;

            if (wrongIds.length === 0 && mastered === 0) {
                dashboardStats.style.display = 'none';
                return;
            }

            dashboardStats.style.display = 'block';

            let msg = `진행 상황: 전체 ${total}문제 중 ${mastered}문제를 맞혔어요.`;
            if (mastered >= total) {
                msg = `🎉 전체 ${total}문제를 모두 맞혔어요! 초기화하면 처음부터 다시 풀 수 있어요.`;
            }
            progressText.textContent = msg;

            if (wrongIds.length > 0) {
                retryWrongBtn.style.display = 'inline-block';
                retryWrongBtn.textContent = `오답 노트 풀기 (${wrongIds.length}문제)`;
            } else {
                retryWrongBtn.style.display = 'none';
            }
        }

        function resetProgress() {
            if (!confirm('맞힌 문제와 오답 노트를 모두 초기화하고 처음부터 다시 풀까요?')) return;
            localStorage.removeItem('ainlp_correct_answers');
            localStorage.removeItem('ainlp_wrong_answers');
            checkSavedWrongAnswers();
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function renderMath() {
            if (window.MathJax) {
                MathJax.typesetPromise().catch((err) => console.log(err.message));
            }
        }

        // --- Core Logic ---
        function startQuiz(isRetry) {
            state.userAnswers = {};
            state.lockedAnswers = {};
            state.currentIndex = 0;
            state.isRetryMode = isRetry;

            if (isRetry) {
                const wrongIds = getWrongAnswers();
                state.questions = MOCK_QUESTIONS.filter(q => wrongIds.includes(q.id));
                if(state.questions.length === 0) {
                    alert("저장된 오답이 없습니다.");
                    return;
                }
            } else {
                const cat = catSelect.value;
                const diff = diffSelect.value;
                const matching = MOCK_QUESTIONS.filter(q => {
                    const matchCat = cat === 'all' || q.category === cat;
                    const matchDiff = diff === 'all' || q.difficulty === diff;
                    return matchCat && matchDiff;
                });

                if (matching.length === 0) {
                    alert("선택한 조건에 맞는 문제가 없습니다.");
                    return;
                }

                // Exclude questions already answered correctly so only new ones appear.
                const correctIds = getCorrectAnswers();
                state.questions = matching.filter(q => !correctIds.includes(q.id));

                if (state.questions.length === 0) {
                    alert("선택한 조건의 모든 문제를 이미 맞혔어요! '진행 상황 초기화'를 누르거나 다른 카테고리/난이도를 선택해 주세요.");
                    return;
                }

                // Shuffle questions
                state.questions.sort(() => Math.random() - 0.5);
            }

            switchScreen('quiz');
            renderQuestion();
        }

        function showDashboard() {
            checkSavedWrongAnswers();
            switchScreen('dashboard');
        }

        function renderQuestion() {
            const q = state.questions[state.currentIndex];
            
            qCategory.textContent = q.category;
            qDifficulty.textContent = q.difficulty;
            
            const currentNum = state.currentIndex + 1;
            const totalNum = state.questions.length;
            qProgressText.textContent = `${currentNum} / ${totalNum}`;
            qProgressBar.style.width = `${(currentNum / totalNum) * 100}%`;
            
            qText.innerHTML = q.question;

            qOptionsContainer.innerHTML = '';
            
            const isLocked = state.lockedAnswers[q.id] === true;

            if (q.type === 'multiple-choice') {
                q.options.forEach((opt, idx) => {
                    const div = document.createElement('div');
                    let classes = 'option-item';
                    
                    if (isLocked) {
                        classes += ' disabled';
                        const isSelected = state.userAnswers[q.id] === opt;
                        const isCorrectAnswer = q.answer === opt;
                        
                        if (isSelected && isCorrectAnswer) {
                            classes += ' correct-choice';
                        } else if (isSelected && !isCorrectAnswer) {
                            classes += ' wrong-choice';
                        } else if (!isSelected && isCorrectAnswer) {
                            classes += ' correct-choice';
                        }
                    } else {
                        if (state.userAnswers[q.id] === opt) classes += ' selected';
                    }

                    div.className = classes;
                    const numSpan = document.createElement('span');
                    numSpan.className = 'opt-num';
                    numSpan.textContent = idx + 1;
                    div.appendChild(numSpan);
                    div.appendChild(document.createTextNode(opt));
                    div.onclick = () => {
                        if (!isLocked) selectOption(q.id, opt);
                    };
                    qOptionsContainer.appendChild(div);
                });

                if (isLocked) {
                    const isCorrect = state.userAnswers[q.id] === q.answer;
                    const explanationDiv = document.createElement('div');
                    explanationDiv.className = 'explanation-box';
                    explanationDiv.style.animation = 'fadeIn 0.3s ease-out';
                    explanationDiv.innerHTML = `
                        <div class="explanation-title" style="color: ${isCorrect ? 'var(--secondary-color)' : 'var(--accent-color)'};">
                            ${isCorrect ? '정답입니다!' : '오답입니다.'}
                        </div>
                        <div style="margin-top: 10px;">${q.explanation}</div>
                    `;
                    qOptionsContainer.appendChild(explanationDiv);
                }

            } else if (q.type === 'short-answer') {
                const inputContainer = document.createElement('div');
                inputContainer.style.display = 'flex';
                inputContainer.style.gap = '10px';
                inputContainer.style.marginBottom = '30px';

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'short-answer-input';
                input.style.marginBottom = '0';
                input.placeholder = '정답을 입력하세요...';
                input.value = state.userAnswers[q.id] || '';
                
                if (isLocked) {
                    input.disabled = true;
                    input.style.opacity = '0.8';
                } else {
                    input.oninput = (e) => { state.userAnswers[q.id] = e.target.value.trim(); };
                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            // Keep this from reaching the global handler, otherwise the
                            // same Enter would also advance to the next question.
                            e.stopPropagation();
                            if (!state.userAnswers[q.id] || state.userAnswers[q.id].trim() === '') {
                                alert("정답을 입력해주세요.");
                                return;
                            }
                            lockAnswer(q.id);
                        }
                    };
                }
                
                inputContainer.appendChild(input);

                if (!isLocked) {
                    const checkBtn = document.createElement('button');
                    checkBtn.className = 'btn btn-secondary';
                    checkBtn.style.width = 'auto';
                    checkBtn.style.padding = '0 20px';
                    checkBtn.textContent = '정답 확인';
                    checkBtn.onclick = () => {
                        if (!state.userAnswers[q.id] || state.userAnswers[q.id].trim() === '') {
                            alert("정답을 입력해주세요.");
                            return;
                        }
                        lockAnswer(q.id);
                    };
                    inputContainer.appendChild(checkBtn);
                }

                qOptionsContainer.appendChild(inputContainer);

                // Focus the input so the user can type right away without the mouse.
                if (!isLocked) setTimeout(() => input.focus(), 0);

                if (isLocked) {
                    const isCorrect = isAnswerCorrect(q, state.userAnswers[q.id]);

                    const explanationDiv = document.createElement('div');
                    explanationDiv.className = 'explanation-box';
                    explanationDiv.style.animation = 'fadeIn 0.3s ease-out';
                    explanationDiv.innerHTML = `
                        <div class="explanation-title" style="color: ${isCorrect ? 'var(--secondary-color)' : 'var(--accent-color)'};">
                            ${isCorrect ? '정답입니다!' : '오답입니다. (정답: ' + q.answer + ')'}
                        </div>
                        <div style="margin-top: 10px;">${q.explanation}</div>
                    `;
                    qOptionsContainer.appendChild(explanationDiv);
                }
            }

            // Buttons visibility
            prevBtn.style.display = state.currentIndex > 0 ? 'inline-block' : 'none';
            
            if (state.currentIndex === state.questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }

            renderMath();
        }

        function lockAnswer(qId) {
            state.lockedAnswers[qId] = true;
            renderQuestion();
        }

        function selectOption(qId, optionVal) {
            if (state.lockedAnswers[qId]) return;
            state.userAnswers[qId] = optionVal;
            lockAnswer(qId);
        }

        function navigate(dir) {
            const newIndex = state.currentIndex + dir;
            if (newIndex >= 0 && newIndex < state.questions.length) {
                state.currentIndex = newIndex;
                renderQuestion();
            }
        }

        // Advance to the next question, or submit the quiz on the last one.
        function goNextOrSubmit() {
            if (state.currentIndex === state.questions.length - 1) {
                finishQuiz();
            } else {
                navigate(1);
            }
        }

        // Keyboard navigation for the quiz screen (mouse-free operation).
        function handleQuizKeydown(e) {
            if (!screens.quiz.classList.contains('active')) return;
            if (e.altKey || e.ctrlKey || e.metaKey) return;

            const q = state.questions[state.currentIndex];
            if (!q) return;
            const isLocked = state.lockedAnswers[q.id] === true;
            const inputEl = qOptionsContainer.querySelector('input');
            const typingInInput = inputEl && document.activeElement === inputEl;

            // While editing the short-answer field, let the input own every key
            // (digits, arrows for cursor movement, Enter to confirm).
            if (typingInInput && !isLocked) return;

            // Number keys select a multiple-choice option.
            if (q.type === 'multiple-choice' && !isLocked && /^[1-9]$/.test(e.key)) {
                const n = parseInt(e.key, 10);
                if (n <= q.options.length) {
                    e.preventDefault();
                    selectOption(q.id, q.options[n - 1]);
                }
                return;
            }

            if (e.key === 'ArrowLeft') {
                if (state.currentIndex > 0) { e.preventDefault(); navigate(-1); }
                return;
            }

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                goNextOrSubmit();
                return;
            }

            if (e.key === 'Enter') {
                // While typing an unlocked short answer, the input's own handler
                // takes care of locking — don't also advance.
                if (typingInInput && !isLocked) return;
                // Don't skip an unanswered multiple-choice question.
                if (!isLocked && q.type === 'multiple-choice') return;
                e.preventDefault();
                goNextOrSubmit();
            }
        }

        // Unified answer grading used by both the per-question view and the results screen.
        function isAnswerCorrect(q, userAnswerRaw) {
            const userAns = (userAnswerRaw || '').toString().toLowerCase();

            // Multiple-choice answers match an option exactly.
            if (q.type === 'multiple-choice') {
                return userAns === q.answer.toString().toLowerCase();
            }

            const correctAns = q.answer.toString().toLowerCase();
            const userAnsClean = userAns.replace(/\s+/g, '');
            const correctAnsClean = correctAns.replace(/\s+/g, '');

            // Build every acceptable variant of the stored answer and compare
            // against the (whitespace-insensitive) user input.
            // Handles:
            //   "Overfitting (과적합)"        → "overfitting" / "과적합"
            //   "eval() (또는 model.eval())"  → "eval()" / "model.eval()"
            //   "Greedy Search (또는 탐욕 탐색)" → both, plus listed alternatives
            const variants = new Set();
            const addVariant = (s) => {
                const v = (s || '').trim().replace(/\s+/g, '');
                if (v) variants.add(v);
            };

            addVariant(correctAns);

            // A parenthetical set off by whitespace ("main (extra)") carries either
            // a translation or alternative answers. Code-style parens like "eval()"
            // have no leading space, so they stay part of the main answer.
            const paren = correctAns.match(/^(.+?)\s+\((.*)\)\s*$/);
            if (paren) {
                addVariant(paren[1]);
                // Drop a leading "또는"/"or" keyword, then split any listed alternatives.
                const extra = paren[2].replace(/^\s*(?:또는|or)\s+/, '');
                extra.split(/\s*(?:또는|or|,|\/)\s*/).forEach(addVariant);
            }

            if (variants.has(userAnsClean)) return true;

            // Synonym dictionary for English-Korean mixed terms.
            const synonyms = {
                "knowledgedistillation": ["지식증류", "knowledgedistillation"],
                "labelsmoothing": ["라벨스무딩", "레이블스무딩", "labelsmoothing"],
                "lossscaling": ["로스스케일링", "lossscaling"],
                "kvcache": ["kv캐시", "kvcache"],
                "flashattention": ["플래시어텐션", "flashattention"],
                "speculativedecoding": ["추측디코딩", "speculativedecoding"],
                "continuousbatching": ["연속배칭", "continuousbatching"],
                "positioninterpolation": ["위치보간", "positioninterpolation"],
                "greedysearch": ["그리디서치", "탐욕탐색", "greedysearch"],
                "temperature": ["온도", "템퍼러처", "temperature"],
            };
            if (synonyms[correctAnsClean] && synonyms[correctAnsClean].includes(userAnsClean)) {
                return true;
            }

            return false;
        }

        function finishQuiz() {
            let correctCount = 0;
            const wrongIds = [];
            const correctIds = [];

            resultsList.innerHTML = '';

            state.questions.forEach((q, index) => {
                const userAns = state.userAnswers[q.id] || '';
                const isCorrect = isAnswerCorrect(q, userAns);

                if (isCorrect) { correctCount++; correctIds.push(q.id); }
                else wrongIds.push(q.id);

                // Build result item
                const itemDiv = document.createElement('div');
                itemDiv.className = `result-item ${isCorrect ? 'correct' : 'incorrect'}`;
                
                itemDiv.innerHTML = `
                    <div class="result-q-header">
                        <span class="text-muted">Question ${index + 1}</span>
                        <span class="status-badge ${isCorrect ? 'status-correct' : 'status-incorrect'}">
                            ${isCorrect ? '정답' : '오답'}
                        </span>
                    </div>
                    <div style="font-weight: 500; margin-bottom: 10px;">${q.question}</div>
                    
                    <div class="answer-comparison">
                        <div>
                            <div class="text-muted" style="font-size:0.8rem; margin-bottom:4px;">제출한 답</div>
                            <div style="color: ${isCorrect ? 'inherit' : 'var(--accent-color)'}">
                                ${userAns || '<span class="text-muted">미입력</span>'}
                            </div>
                        </div>
                        <div>
                            <div class="text-muted" style="font-size:0.8rem; margin-bottom:4px;">실제 정답</div>
                            <div style="color: var(--secondary-color);">${q.answer}</div>
                        </div>
                    </div>

                    <div class="explanation-box">
                        <div class="explanation-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            상세 해설
                        </div>
                        <div>${q.explanation}</div>
                    </div>
                `;
                resultsList.appendChild(itemDiv);
            });

            const scorePercent = Math.round((correctCount / state.questions.length) * 100);
            
            // Animate circle
            scoreCircle.style.setProperty('--percentage', `${scorePercent * 3.6}deg`);
            scoreText.textContent = `${scorePercent}%`;
            scoreSummary.textContent = `Total: ${correctCount} / ${state.questions.length} 정답`;

            // Update wrong answers
            const existingWrong = getWrongAnswers();
            let newWrongList = [];

            if (state.isRetryMode) {
                // Remove corrected ones from the list
                newWrongList = existingWrong.filter(id => !state.questions.some(q => q.id === id) || wrongIds.includes(id));
            } else {
                // Add new wrong ones, keeping unique
                newWrongList = [...new Set([...existingWrong, ...wrongIds])];
            }

            saveWrongAnswers(newWrongList);

            // Update mastered (correctly answered) questions: add the ones just
            // answered correctly, and drop any that were just answered wrong so
            // they reappear in future sessions.
            const newCorrectList = [...new Set([...getCorrectAnswers(), ...correctIds])]
                .filter(id => !wrongIds.includes(id));
            saveCorrectAnswers(newCorrectList);

            if (wrongIds.length > 0) {
                reviewWrongBtn.style.display = 'inline-block';
            } else {
                reviewWrongBtn.style.display = 'none';
            }

            switchScreen('results');
            renderMath();
            window.scrollTo(0, 0);
        }

        // Run Init
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
